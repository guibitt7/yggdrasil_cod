global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'yggdrasil'
    env: 'production'

rule_files:
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'monitoring-core'

  - job_name: 'ygg-server-linux'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: 'ygg-server-linux-01'
          source: 'infrastructure'

  - job_name: 'ygg-loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: 'loki'

  - job_name: 'ygg-alloy'
    static_configs:
      - targets: ['alloy:12345']
        labels:
          service: 'alloy'